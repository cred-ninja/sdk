[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cred-auth"
version = "1.0.0"
description = "Cred — credential delegation SDK for AI agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "Cred", email = "hello@cred.ninja" }]
keywords = ["cred", "oauth", "delegation", "ai-agents", "credentials"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = ["httpx>=0.24"]

[project.urls]
Homepage = "https://cred.ninja"
Repository = "https://github.com/credninja/cred-python"
Documentation = "https://docs.cred.ninja"

[project.optional-dependencies]
dev = ["pytest>=7.0", "respx>=0.20", "hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["cred"]

[tool.pytest.ini_options]
testpaths = ["tests"]
