[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cred-crewai"
version = "0.1.0"
description = "Cred CrewAI integration — pre-configured credential delegation tools for CrewAI agents"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
authors = [{ name = "Cred", email = "hello@cred.ninja" }]
keywords = ["cred", "crewai", "oauth", "delegation", "ai-agents"]
dependencies = [
    "cred-auth>=0.1.0",
    "crewai>=0.11",
    "langchain-core>=0.2",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["cred_crewai"]

[tool.pytest.ini_options]
testpaths = ["tests"]
