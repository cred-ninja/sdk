[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cred-autogen"
version = "1.0.0"
description = "Cred AutoGen integration — credential delegation FunctionTool for Microsoft AutoGen agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "Cred", email = "hello@cred.ninja" }]
keywords = ["cred", "autogen", "microsoft", "oauth", "delegation", "ai-agents"]
dependencies = [
    "cred-auth>=0.1.0",
    "autogen-core>=0.4",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["cred_autogen"]

[tool.pytest.ini_options]
testpaths = ["tests"]
