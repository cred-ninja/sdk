[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cred-langchain"
version = "0.1.0"
description = "Cred LangChain integration — credential delegation tools for LangChain agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "Cred", email = "hello@cred.ninja" }]
keywords = ["cred", "langchain", "oauth", "delegation", "ai-agents"]
dependencies = [
    "cred-auth>=0.1.0",
    "langchain-core>=0.2",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["cred_langchain"]

[tool.pytest.ini_options]
testpaths = ["tests"]
