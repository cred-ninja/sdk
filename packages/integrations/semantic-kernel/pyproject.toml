[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cred-semantic-kernel"
version = "1.0.0"
description = "Cred Semantic Kernel integration — credential delegation plugin for Microsoft Semantic Kernel agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "Cred", email = "hello@cred.ninja" }]
keywords = ["cred", "semantic-kernel", "microsoft", "oauth", "delegation", "ai-agents"]
dependencies = [
    "cred-auth>=0.1.0",
    "semantic-kernel>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["cred_semantic_kernel"]

[tool.pytest.ini_options]
testpaths = ["tests"]
