name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      # Build dependencies first — SDK and server tests import vault/oauth at runtime
      - name: Build @credninja/oauth
        run: npm run build --workspace=packages/oauth

      - name: Build @credninja/vault
        run: npm run build --workspace=packages/vault

      - name: Build @credninja/guard
        run: npm run build --workspace=packages/guard

      - name: Build @credninja/sdk
        run: npm run build --workspace=packages/sdk

      - name: Test @credninja/oauth
        run: npm test --workspace=packages/oauth

      - name: Test @credninja/vault
        run: npm test --workspace=packages/vault

      - name: Test @credninja/guard
        run: npm test --workspace=packages/guard

      - name: Test @credninja/sdk
        run: npm test --workspace=packages/sdk

      - name: Test @credninja/server
        run: npm test --workspace=packages/server

      - name: Test @credninja/ai
        run: npm test --workspace=packages/integrations/vercel-ai

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Build @credninja/oauth
        run: npm run build --workspace=packages/oauth

      - name: Build @credninja/vault
        run: npm run build --workspace=packages/vault

      - name: Build @credninja/guard
        run: npm run build --workspace=packages/guard

      - name: Build @credninja/sdk
        run: npm run build --workspace=packages/sdk

      - name: Build @credninja/server
        run: npm run build --workspace=packages/server

      - name: Build @credninja/ai
        run: npm run build --workspace=packages/integrations/vercel-ai

      - name: Build @credninja/mcp
        run: npm run build --workspace=packages/mcp

      - name: Pack create-cred-app
        run: npm pack --dry-run ./packages/create-cred-app
